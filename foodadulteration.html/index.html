<script>
  // Visible error overlay — if any CDN script fails or the app throws,
  // you'll see the actual error instead of a blank white page.
  window.addEventListener('error', function (e) {
    showFatalError(e.message + (e.filename ? (' — ' + e.filename + ':' + e.lineno) : ''));
  });
  window.addEventListener('unhandledrejection', function (e) {
    showFatalError(String(e.reason && e.reason.message ? e.reason.message : e.reason));
  });
  function showFatalError(msg) {
    var el = document.getElementById('fatal-error');
    if (!el) {
      el = document.createElement('div');
      el.id = 'fatal-error';
      el.style = 'position:fixed;inset:0;background:#1c1917;color:#fca5a5;font-family:monospace;' +
                 'padding:32px;z-index:99999;overflow:auto;font-size:14px;line-height:1.6;white-space:pre-wrap;';
      document.body.appendChild(el);
      el.innerHTML = '<h2 style="color:#fff;font-size:20px;margin-bottom:16px;">⚠ PureCheck failed to load</h2>';
    }
    var line = document.createElement('div');
    line.textContent = msg;
    el.appendChild(line);
  }
</script>

--------------------------------------------------------- */
const DB_KEY = "purecheck_reports_v1";
function loadReports() {
  try { return JSON.parse(localStorage.getItem(DB_KEY)) || []; }
  catch { return []; }
}
function saveReports(list) {
  localStorage.setItem(DB_KEY, JSON.stringify(list));
}
function uid() { return Math.random().toString(36).slice(2) + Date.now().toString(36); }

function riskFromScore(score) {
  if (score >= 80) return "safe";
  if (score >= 60) return "low";
  if (score >= 40) return "moderate";
  if (score >= 20) return "high";
  return "critical";
}
const RISK_BADGE = {

};

function gaugeColor(score) {
  if (score >= 80) return "#15803d";
  if (score >= 60) return "#d97706";
  if (score >= 40) return "#ea580c";
  return "#dc2626";
}

/* ---------------------------------------------------------

--------------------------------------------------------- */
function Navbar({ page, setPage }) {
  const [open, setOpen] = useState(false);
  const [scrolled, setScrolled] = useState(false);

  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 8);
    window.addEventListener("scroll", onScroll);
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  const navLink = (label, id) => (
    <a href={`#${id}`} onClick={(e)=>{
        if (page !== "home") { e.preventDefault(); setPage("home"); setTimeout(()=>{
          document.getElementById(id)?.scrollIntoView({behavior:"smooth"});
        }, 60); }
      }}
      className="text-stone-700 hover:text-emerald-700 transition-colors text-[15px] font-medium">
      {label}
    </a>
  );

  return (
    <header className={`sticky top-0 z-50 transition-all ${scrolled ? "glass shadow-sm" : "bg-transparent"}`}>
      <div className="max-w-7xl mx-auto px-6 md:px-10 h-20 flex items-center justify-between">
        <button onClick={()=>setPage("home")} className="flex items-center gap-2.5 group">
          <span className="w-9 h-9 rounded-xl bg-emerald-700 flex items-center justify-center shadow-sm group-hover:scale-105 transition-transform">
            <ShieldIcon className="w-5 h-5 text-white" />
          </span>
          <span className="text-xl font-bold text-stone-900 tracking-tight">PureCheck</span>
        </button>

        <nav className="hidden md:flex items-center gap-9">
          {navLink("Categories","categories")}
          {navLink("How It Works","how-it-works")}
          {navLink("Knowledge Base","knowledge-base")}
        </nav>

/* ---------------------------------------------------------
   ANALYZE PAGE
--------------------------------------------------------- */
function AnalyzePage({ setPage, openReport }) {
  const [foodName, setFoodName] = useState("");
  const [category, setCategory] = useState(null);
  const [image, setImage] = useState(null);
  const [details, setDetails] = useState("");
  const [loading, setLoading] = useState(false);
  const fileRef = useRef(null);

  const onFile = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => setImage(reader.result);
    reader.readAsDataURL(file);
  };

  const canSubmit = foodName.trim() && category && !loading;

  const handleSubmit = async () => {
    if (!canSubmit) return;
    setLoading(true);
    let report;
    try {
      report = await invokeAIAnalysis({ food_name: foodName, food_category: category, image_url: image, details });
    } catch (err) {
      report = generateMockReport({ food_name: foodName, food_category: category, image_url: image });
    }
    const fullReport = { id: uid(), created_date: new Date().toISOString(), ...report };
    const all = loadReports();
    all.unshift(fullReport);
    saveReports(all);
    setLoading(false);
    openReport(fullReport.id);
  };

  return (
    <div className="min-h-screen">
      <SubTopBar setPage={setPage} backTo="home" />
      <div className="max-w-3xl mx-auto px-6 md:px-10 py-16 animate-fadeUp">
        <h1 className="text-5xl font-bold text-stone-900 mb-3">Analyze Your Food</h1>
        <p className="text-stone-600 text-lg mb-12">Provide details about the food item you want to check for adulteration.</p>

        <label className="block font-semibold text-stone-800 mb-2">Food Name <span className="text-red-500">*</span></label>
        <input value={foodName} onChange={e=>setFoodName(e.target.value)}
          placeholder="e.g. Turmeric Powder, Whole Milk, Basmati Rice"
          className="w-full bg-white border border-stone-200 rounded-2xl px-5 py-4 text-stone-900 placeholder-stone-400 outline-none focus:ring-2 focus:ring-emerald-600/40 focus:border-emerald-600 transition-all mb-9" />

        <label className="block font-semibold text-stone-800 mb-3">Category <span className="text-red-500">*</span></label>
        <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-9">
          {FOOD_CATEGORIES.map(c => (
            <button key={c.value} onClick={()=>setCategory(c.value)}
              className={`flex items-center gap-2 justify-center md:justify-start px-4 py-4 rounded-2xl border text-sm font-medium transition-all
                ${category === c.value ? "bg-stone-900 text-white border-stone-900" : "bg-white border-stone-200 text-stone-700 hover:border-emerald-600/50"}`}>
              <span className="text-lg">{c.emoji}</span> {c.label}
            </button>
          ))}
        </div>

        <label className="block font-semibold text-stone-800 mb-3">Food Image <span className="text-stone-400 font-normal">(optional)</span></label>
        <input ref={fileRef} type="file" accept="image/png,image/jpeg" className="hidden" onChange={onFile} />
        {!image ? (
          <button onClick={()=>fileRef.current?.click()}
            className="w-full border-2 border-dashed border-stone-300 rounded-2xl py-14 flex flex-col items-center gap-3 text-stone-500 hover:border-emerald-600/50 hover:bg-white transition-all mb-9">
            <CameraIcon className="w-9 h-9" />
            <span className="font-medium text-stone-700">Click to upload a food image</span>
            <span className="text-xs">PNG, JPG up to 10MB</span>
          </button>
        ) : (
          <div className="relative mb-9 rounded-2xl overflow-hidden border border-stone-200">
            <img src={image} className="w-full max-h-80 object-cover" />
            <button onClick={()=>setImage(null)}
              className="absolute top-3 right-3 bg-white/90 hover:bg-white rounded-full p-2 shadow">
              <TrashIcon className="w-4 h-4 text-red-600" />
            </button>
          </div>
        )}

        <label className="block font-semibold text-stone-800 mb-3">Additional Details <span className="text-stone-400 font-normal">(optional)</span></label>
        <textarea value={details} onChange={e=>setDetails(e.target.value)} rows={4}
          placeholder="Describe the food's appearance, smell, texture, source, brand, or any concerns..."
          className="w-full bg-white border border-stone-200 rounded-2xl px-5 py-4 text-stone-900 placeholder-stone-400 outline-none focus:ring-2 focus:ring-emerald-600/40 focus:border-emerald-600 transition-all mb-9 resize-none" />

        <button disabled={!canSubmit} onClick={handleSubmit}
          className={`w-full flex items-center justify-center gap-2 py-4 rounded-2xl font-semibold text-white transition-all
            ${canSubmit ? "bg-stone-900 hover:bg-emerald-700" : "bg-stone-400 cursor-not-allowed"}`}>
          {loading ? (
            <>
              <span className="w-4 h-4 border-2 border-white/40 border-t-white rounded-full animate-spin"></span>
              Analyzing...
            </>
          ) : (
            <><SparklesIcon className="w-4 h-4" /> Run Analysis</>
          )}
        </button>
      </div>
    </div>
  );
}

/* ---------------------------------------------------------
   GAUGE
--------------------------------------------------------- */
function SafetyGauge({ score }) {
  const r = 64, c = 2*Math.PI*r;
  const [dash, setDash] = useState(c);
  useEffect(()=>{
    const offset = c - (score/100)*c;
    requestAnimationFrame(()=> setTimeout(()=>setDash(offset), 80));
  }, [score]);
  const color = gaugeColor(score);
  return (
    <div className="relative w-44 h-44 flex items-center justify-center">
      <svg viewBox="0 0 160 160" className="w-44 h-44 -rotate-90">
        <circle cx="80" cy="80" r={r} stroke="#e7e2da" strokeWidth="12" fill="none" />
        <circle cx="80" cy="80" r={r} stroke={color} strokeWidth="12" fill="none"
          strokeDasharray={c} strokeDashoffset={dash} strokeLinecap="round" className="gauge-ring" />
      </svg>
      <div className="absolute flex flex-col items-center">
        <span className="text-4xl font-bold" style={{color}}>{score}</span>
        <span className="text-stone-400 text-sm">/ 100</span>
      </div>
    </div>
  );
}

  const [open, setOpen] = useState(false);
  const sevColor = { low:"bg-blue-100 text-blue-700", moderate:"bg-amber-100 text-amber-700",
    high:"bg-orange-100 text-orange-700", critical:"bg-red-100 text-red-700" }[item.severity] || "bg-stone-100 text-stone-700";
  return (
    <div className="bg-white border border-stone-100 rounded-2xl overflow-hidden">
      <button onClick={()=>setOpen(!open)} className="w-full flex items-center justify-between p-6 text-left">
        <div className="flex items-center gap-4">
          <span className="w-10 h-10 rounded-xl bg-amber-50 flex items-center justify-center flex-shrink-0">
            <AlertTriangleIcon className="w-5 h-5 text-amber-600" />
          </span>
          <div>
            <h4 className="font-bold text-stone-900">{item.name}</h4>
            <span className={`inline-block mt-1 text-xs font-semibold px-2.5 py-1 rounded-full ${sevColor}`}>{item.severity}</span>
          </div>
        </div>
        <ChevronDownIcon className={`w-5 h-5 text-stone-400 transition-transform ${open ? "rotate-180" : ""}`} />
      </button>
      {open && (
        <div className="px-6 pb-6 pl-[4.5rem] flex flex-col gap-3 animate-fadeUp">
          <div><span className="font-semibold text-stone-700 text-sm">Description: </span><span className="text-stone-600 text-sm">{item.description}</span></div>
          <div><span className="font-semibold text-stone-700 text-sm">Health Impact: </span><span className="text-stone-600 text-sm">{item.health_impact}</span></div>
          <div><span className="font-semibold text-stone-700 text-sm">Detection Method: </span><span className="text-stone-600 text-sm">{item.detection_method}</span></div>
        </div>
      )}
    </div>
  );
}

    return <div className="min-h-screen flex items-center justify-center">

              <span className={`text-xs font-semibold px-3 py-1.5 rounded-full ${RISK_BADGE[report.risk_level]}`}>{RISK_LABEL[report.risk_level]}</span>
            </div>

/* ---------------------------------------------------------
   APP ROOT (simple state-based router)
--------------------------------------------------------- */
function App() {
  const [page, setPageRaw] = useState("home");
  const [reportId, setReportId] = useState(null);

  const setPage = (p) => { window.scrollTo({top:0, behavior:"instant"}); setPageRaw(p); };
  const openReport = (id) => { setReportId(id); setPage("report"); };

  return (
    <div className="min-h-screen bg-[#f5f0eb] text-stone-900">
      {page === "home" && <Navbar page={page} setPage={setPage} />}
      {page === "home" && <HomePage setPage={setPage} />}
      {page === "analyze" && <AnalyzePage setPage={setPage} openReport={openReport} />}
      {page === "reports" && <ReportsPage setPage={setPage} openReport={openReport} />}
      {page === "report" && <ReportDetailPage id={reportId} setPage={setPage} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
